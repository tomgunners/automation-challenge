name: QA Monorepo - Web | API | Performance
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'   # 🌙 Nightly às 02:00 UTC (todo dia)
  workflow_dispatch:
env:
  NODE_VERSION: 20
  PNPM_VERSION: 9
jobs:
  qa-tests:
    name: Automação - ${{ matrix.package }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: web
            path: web
            script: test
          - package: api
            path: api
            script: test
          - package: performance
            path: performance
            script: test
    steps:
      # ===============================
      # 📥 Checkout
      # ===============================
      - name: 📥 Checkout
        uses: actions/checkout@v4
      # ===============================
      # 🟣 Setup PNPM
      # ===============================
      - name: 🟣 Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      # ===============================
      # 🟢 Setup Node.js
      # ===============================
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      # ===============================
      # ⚡ Install k6 (only performance)
      # ===============================
      - name: ⚡ Install k6
        if: matrix.package == 'performance'
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg ca-certificates
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      # ===============================
      # 📦 Install dependencies (workspace-aware)
      # ===============================
      - name: 📦 Install dependencies
        run: |
          pnpm install --frozen-lockfile --filter ./${{ matrix.path }}...
      # ===============================
      # 🌐 Install Playwright Browsers (web & api)
      # ===============================
      - name: 🌐 Install Playwright Browsers
        if: matrix.package == 'web'
        run: |
          pnpm --filter ./${{ matrix.path }} exec playwright install --with-deps
      # ===============================
      # 🧪 Run tests - WEB / API
      # ===============================
      - name: 🧪 Run tests - ${{ matrix.package }}
        if: matrix.package != 'performance'
        env:
          ENV: ci
        run: |
          pnpm --filter ./${{ matrix.path }} run ${{ matrix.script }}
      # ===============================
      # 🧪 Run tests - PERFORMANCE
      # ===============================
      - name: 🧪 Run tests - ${{ matrix.package }}
        if: matrix.package == 'performance'
        run: |
          pnpm --filter ./${{ matrix.path }} run ${{ matrix.script }}
        continue-on-error: true
      # ===============================
      # 📊 Upload Artifacts
      # ===============================
      - name: 📊 Upload Results - ${{ matrix.package }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.package }}-${{ github.run_id }}
          path: |
            ${{ matrix.path }}/playwright-report/**
            ${{ matrix.path }}/allure-results/**
            ${{ matrix.path }}/results/**
          if-no-files-found: warn
